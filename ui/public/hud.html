<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; background: transparent; overflow: hidden; }
  #card {
    box-sizing: border-box;
    margin: 6px;
    height: 64px;
    border-radius: 10px;
    background: rgba(24, 24, 28, 0.94);
    color: #e7e7ea;
    font: 13px/1.35 "Segoe UI", system-ui, sans-serif;
    padding: 10px 14px;
    box-shadow: 0 4px 18px rgba(0,0,0,.35);
    display: flex; flex-direction: column; justify-content: center; gap: 3px;
  }
  #title { font-weight: 600; font-size: 12px; color: #9fe870; }
  #title.secret { color: #f0a35e; }
  #preview { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #c9c9cf; }
</style>
</head>
<body>
  <div id="card">
    <div id="title">captured</div>
    <div id="preview"></div>
  </div>
<script>
  const { listen } = window.__TAURI__.event;
  const win = window.__TAURI__.window.getCurrentWindow();
  let hideTimer = null;
  listen("capture", (e) => {
    const c = e.payload;
    const title = document.getElementById("title");
    const isSecret = c.sensitivity === "secret";
    title.textContent = isSecret
      ? "captured (secret — stored encrypted, never indexed)"
      : `captured · ${c.entity_type}${c.deduped ? " · duplicate" : ""}`;
    title.className = isSecret ? "secret" : "";
    document.getElementById("preview").textContent = isSecret ? "••••••••" : c.preview;
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => win.hide(), 2000);
  });
</script>
</body>
</html>
